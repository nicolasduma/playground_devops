<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastro de Cliente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #F7F8FA;
      --surface:   #FFFFFF;
      --border:    #E2E6EE;
      --accent:    #2563EB;
      --accent-dk: #1D4ED8;
      --text:      #0F172A;
      --muted:     #64748B;
      --error:     #DC2626;
      --success:   #16A34A;
      --radius:    10px;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem 2.25rem;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 4px 24px rgba(15,23,42,.07);
    }

    .card-header {
      margin-bottom: 2rem;
    }

    .eyebrow {
      display: inline-block;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--accent);
      background: #EFF6FF;
      padding: .25rem .65rem;
      border-radius: 999px;
      margin-bottom: .75rem;
    }

    .card-header h1 {
      font-family: 'Sora', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1.25;
      color: var(--text);
    }

    .card-header p {
      margin-top: .4rem;
      font-size: .875rem;
      color: var(--muted);
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin-bottom: 1.75rem;
    }

    .field { margin-bottom: 1.25rem; }

    label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: .45rem;
      letter-spacing: .02em;
    }

    label .required {
      color: var(--error);
      margin-left: 2px;
    }

    input {
      width: 100%;
      padding: .65rem .9rem;
      font-family: 'Inter', sans-serif;
      font-size: .9rem;
      color: var(--text);
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }

    input::placeholder { color: #A0AABF; }

    input:focus {
      border-color: var(--accent);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }

    input.invalid {
      border-color: var(--error);
      background: #FFF5F5;
    }

    .hint {
      margin-top: .35rem;
      font-size: .75rem;
      color: var(--muted);
    }

    .error-msg {
      display: none;
      margin-top: .35rem;
      font-size: .75rem;
      color: var(--error);
      font-weight: 500;
    }

    .error-msg.visible { display: block; }

    .btn {
      width: 100%;
      margin-top: 1.75rem;
      padding: .8rem;
      background: var(--accent);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background .15s, transform .1s, box-shadow .15s;
      letter-spacing: .01em;
    }

    .btn:hover  { background: var(--accent-dk); box-shadow: 0 4px 14px rgba(37,99,235,.3); }
    .btn:active { transform: scale(.98); }

    .toast {
      display: none;
      margin-top: 1.25rem;
      padding: .8rem 1rem;
      border-radius: var(--radius);
      font-size: .85rem;
      font-weight: 500;
      text-align: center;
    }

    .toast.success { display: block; background: #F0FDF4; color: var(--success); border: 1px solid #BBF7D0; }
    .toast.error   { display: block; background: #FEF2F2; color: var(--error);   border: 1px solid #FECACA; }

    @media (max-width: 480px) {
      .card { padding: 1.75rem 1.25rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <span class="eyebrow">Novo Cadastro</span>
    <h1>Cadastro de Cliente</h1>
    <p>Preencha os dados abaixo para criar seu cadastro.</p>
  </div>

  <div class="divider"></div>

  <div class="field">
    <label for="nome">Nome completo <span class="required">*</span></label>
    <input type="text" id="nome" placeholder="Ex.: Maria Silva" autocomplete="name" />
    <div class="error-msg" id="nome-error">Informe seu nome completo.</div>
  </div>

  <div class="field">
    <label for="cpf">CPF <span class="required">*</span></label>
    <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" autocomplete="off" />
    <div class="hint">Somente números — formatação automática.</div>
    <div class="error-msg" id="cpf-error">CPF inválido. Verifique e tente novamente.</div>
  </div>

  <div class="field">
    <label for="email">E-mail <span class="required">*</span></label>
    <input type="email" id="email" placeholder="exemplo@email.com" autocomplete="email" />
    <div class="error-msg" id="email-error">Informe um e-mail válido.</div>
  </div>

  <button class="btn" onclick="handleSubmit()">Cadastrar cliente</button>

  <div class="toast" id="toast"></div>
</div>

<script>
  /* ── CPF mask ── */
  document.getElementById('cpf').addEventListener('input', function () {
    let v = this.value.replace(/\D/g, '').slice(0, 11);
    if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
    else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
    else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
    this.value = v;
  });

  /* ── CPF validation ── */
  function validarCPF(cpf) {
    cpf = cpf.replace(/\D/g, '');
    if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
    let s = 0;
    for (let i = 0; i < 9; i++) s += +cpf[i] * (10 - i);
    let r = (s * 10) % 11; if (r === 10 || r === 11) r = 0;
    if (r !== +cpf[9]) return false;
    s = 0;
    for (let i = 0; i < 10; i++) s += +cpf[i] * (11 - i);
    r = (s * 10) % 11; if (r === 10 || r === 11) r = 0;
    return r === +cpf[10];
  }

  function setError(id, errId, show) {
    const input = document.getElementById(id);
    const msg   = document.getElementById(errId);
    input.classList.toggle('invalid', show);
    msg.classList.toggle('visible', show);
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type;
  }

  function handleSubmit() {
    const nome  = document.getElementById('nome').value.trim();
    const cpf   = document.getElementById('cpf').value.trim();
    const email = document.getElementById('email').value.trim();

    const nomeOk  = nome.length >= 3;
    const cpfOk   = validarCPF(cpf);
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);

    setError('nome',  'nome-error',  !nomeOk);
    setError('cpf',   'cpf-error',   !cpfOk);
    setError('email', 'email-error', !emailOk);

    if (nomeOk && cpfOk && emailOk) {
      showToast('✓ Cliente cadastrado com sucesso!', 'success');
      document.getElementById('nome').value  = '';
      document.getElementById('cpf').value   = '';
      document.getElementById('email').value = '';
    } else {
      showToast('Corrija os campos destacados antes de continuar.', 'error');
    }
  }
</script>
</body>
</html>
